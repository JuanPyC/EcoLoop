services:
  postgres:
    image: postgres:16
    container_name: ecoloop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecoloop
      POSTGRES_PASSWORD: ecoloop
      POSTGRES_DB: ecoloop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/init:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: juanpyc/ecoloop-backend:local
    container_name: ecoloop-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 4000
      NODE_ENV: production
      FRONTEND_ORIGIN: http://localhost:3000
      DATABASE_URL: postgres://ecoloop:ecoloop@postgres:5432/ecoloop
      JWT_SECRET: super-secret-change-me
      JWT_EXPIRES_IN: 7d
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: juanpyc/ecoloop-frontend:local
    container_name: ecoloop-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_SERVER_URL: http://backend:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
